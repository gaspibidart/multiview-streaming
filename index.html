<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Streaming AR — MultiView</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#090910;--bg2:#0f0f18;--bg3:#17172a;--bg4:#1e1e32;--bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.16);--acc:#e8303a;--text:#ededf0;--t2:#7a7a8c;--t3:#3e3e52;--green:#22c55e;--yellow:#f59e0b;--mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;display:flex;flex-direction:column;}
/* HEADER */
#hdr{height:46px;flex-shrink:0;display:flex;align-items:center;gap:8px;padding:0 10px;background:var(--bg2);border-bottom:1px solid var(--bd);z-index:10;overflow-x:auto;}
#hdr::-webkit-scrollbar{display:none;}
.logo{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--text);white-space:nowrap;flex-shrink:0;}
.logo-yt{width:20px;height:14px;background:var(--acc);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-yt::after{content:'';border-left:6px solid #fff;border-top:3.5px solid transparent;border-bottom:3.5px solid transparent;margin-left:2px;}
.sep{width:1px;height:18px;background:var(--bd2);flex-shrink:0;}
.ltg{display:flex;gap:2px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:2px;flex-shrink:0;}
.ltb{font-family:var(--mono);font-size:9px;font-weight:700;padding:4px 8px;border-radius:4px;border:none;background:transparent;color:var(--t2);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.ltb.on{background:var(--bg3);color:var(--text);border:1px solid var(--bd2);}
.btn{font-family:var(--mono);font-size:9px;font-weight:700;padding:6px 10px;border-radius:6px;border:1px solid var(--bd2);background:var(--bg3);color:var(--text);cursor:pointer;white-space:nowrap;text-transform:uppercase;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#fff;}
.btn.ghost{background:transparent;border-color:var(--bd);}
.btn.sm{padding:3px 7px;font-size:8px;}
/* CONFIG */
#cfg{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px;max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#cfg.hide{display:none;}
.cfg-tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:10px;}
.cfg-tab{font-family:var(--mono);font-size:9px;font-weight:700;padding:6px 10px;border:none;background:transparent;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;text-transform:uppercase;-webkit-tap-highlight-color:transparent;}
.cfg-tab.on{color:var(--text);border-bottom-color:var(--acc);}
.cfg-pane{display:none;}.cfg-pane.on{display:block;}
/* LISTA DE CANALES con drag */
.ch-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.ch-row{display:flex;align-items:center;gap:5px;cursor:grab;border-radius:6px;transition:background .1s;}
.ch-row.dragging{opacity:.4;cursor:grabbing;}
.ch-row.drag-over{background:rgba(255,255,255,.06);}
.ch-drag{color:var(--t3);font-size:14px;cursor:grab;padding:0 3px;flex-shrink:0;user-select:none;}
.ch-num{font-family:var(--mono);font-size:9px;color:var(--t3);min-width:11px;text-align:right;font-weight:700;}
.ch-preset-pill{flex:1;display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:6px 9px;}
.cp-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}.cp-name{font-size:13px;font-weight:600;}.cp-tag{font-family:var(--mono);font-size:7px;color:var(--t2);margin-left:auto;}
input[type=text]{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:8px 9px;color:var(--text);font-family:var(--sans);font-size:16px;outline:none;-webkit-appearance:none;}
input[type=text]::placeholder{color:var(--t3);}
.star-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--bd);background:var(--bg);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.star-btn.on{background:rgba(245,158,11,.15);border-color:var(--yellow);color:var(--yellow);}
.rm-btn{width:26px;height:26px;border-radius:5px;border:1px solid rgba(239,68,68,.3);background:var(--bg);color:#f87171;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.ch-actions{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
/* PRESETS GRID */
.presets-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.pchip{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:6px 9px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;}
.pchip.added{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.05);}
.plogo{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;font-family:var(--mono);color:#fff;flex-shrink:0;}
.pname{font-size:12px;font-weight:600;}
.padd{font-size:12px;font-weight:700;min-width:12px;text-align:center;}
.pchip:not(.added) .padd{color:var(--green);}
.pchip.added .padd{color:#f87171;}
/* AGREGAR CANAL */
.add-box{border-top:1px solid var(--bd);padding-top:10px;}
.add-title{font-family:var(--mono);font-size:9px;color:var(--t2);margin-bottom:7px;letter-spacing:.06em;text-transform:uppercase;}
.add-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.add-row input{flex:1;min-width:140px;}
.add-note{font-size:10px;color:var(--t3);margin-top:5px;font-family:var(--mono);}
/* AREA */
#area{flex:1;min-height:0;position:relative;overflow:hidden;}
#vcon{position:absolute;inset:0;}
/* GRID */
.vg{display:grid;gap:3px;padding:3px;width:100%;height:100%;}
.vg.g1{grid-template-columns:1fr;grid-template-rows:1fr;}
.vg.g2{grid-template-columns:1fr 1fr;grid-template-rows:1fr;}
.vg.g3{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr;}
.vg.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.vg.g5{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;}
.vg.g6{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;}
.vg.g7{grid-template-columns:1fr 1fr 1fr 1fr;grid-template-rows:1fr 1fr;}
.vg.g8{grid-template-columns:1fr 1fr 1fr 1fr;grid-template-rows:1fr 1fr;}
.vg.g9{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;}
@media(max-width:600px){
  .vg.g3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
  .vg.g5,.vg.g6{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;}
  .vg.g7,.vg.g8{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr 1fr;}
  .vg.g9{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr 1fr 1fr;}
  .sv-viewers{font-size:14px;padding:2px 7px;}
  .cc{width:20px;height:20px;font-size:9px;}
}
/* MODO PRINCIPAL */
.main-wrap{display:flex;flex-direction:column;gap:3px;padding:3px;width:100%;height:100%;}
.main-big{flex:1;min-height:0;display:flex;flex-direction:column;}
.main-row{display:flex;flex-direction:row;gap:3px;height:20%;flex-shrink:0;min-height:70px;max-height:180px;}
.main-row .vc{flex:1;min-width:0;}
.main-big .vc{flex:1;min-height:0;}
@media(max-width:600px){.main-row{height:22%;min-height:75px;}}
/* CARD */
.vc{background:var(--bg2);border-radius:7px;border:1px solid var(--bd);overflow:hidden;display:flex;flex-direction:column;min-height:0;min-width:0;}
.vc.is-main-card{border-color:rgba(245,158,11,.7);border-width:2px;}
.vc.is-offline .vw{opacity:.5;}
/* STAT BAR */
.ct{display:flex;align-items:center;padding:3px 6px;background:rgba(0,0,0,.75);border-bottom:1px solid var(--bd);gap:4px;flex-shrink:0;min-height:28px;}
.ch-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ch-name{font-size:10px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.stats{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.stat-block{display:flex;align-items:center;gap:2px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);flex-shrink:0;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.sv-viewers{font-family:var(--mono);font-size:13px;font-weight:700;color:#fff;background:var(--acc);padding:1px 6px;border-radius:4px;white-space:nowrap;}
.sv-viewers.dim{background:rgba(232,48,58,.2);color:rgba(255,255,255,.35);font-size:10px;}

.stat-ico{font-size:10px;}

.card-btns{display:flex;gap:2px;margin-left:2px;flex-shrink:0;}
.cc{width:22px;height:22px;border-radius:4px;border:1px solid var(--bd);background:rgba(0,0,0,.3);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;-webkit-tap-highlight-color:transparent;}
.cc.muted{color:var(--acc);}
.cc.make-main{color:var(--t3);}
.cc.make-main.is-main{color:var(--yellow);background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.5);}
/* VIDEO */
.vw{flex:1;position:relative;min-height:0;background:#000;}
.vw iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.vph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:var(--bg);}
.vph-ico{width:28px;height:20px;background:rgba(255,255,255,.04);border-radius:4px;display:flex;align-items:center;justify-content:center;}
.vph-ico::after{content:'';border-left:9px solid rgba(255,255,255,.1);border-top:5px solid transparent;border-bottom:5px solid transparent;margin-left:2px;}
.vph-txt{font-size:10px;color:var(--t2);font-family:var(--mono);}
.vph-sub{font-size:9px;color:var(--t3);font-family:var(--mono);}
.spin{width:14px;height:14px;border:2px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px;}
.empty-ico{width:44px;height:30px;background:rgba(255,255,255,.03);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.empty-ico::after{content:'';border-left:13px solid rgba(255,255,255,.08);border-top:8px solid transparent;border-bottom:8px solid transparent;margin-left:3px;}
.empty-t{font-family:var(--mono);font-size:12px;color:var(--t2);}
.empty-s{font-size:11px;color:var(--t3);max-width:240px;line-height:1.6;}
.toast{position:fixed;bottom:12px;right:12px;background:var(--bg3);border:1px solid var(--bd2);border-radius:6px;padding:7px 12px;font-family:var(--mono);font-size:9px;color:var(--text);z-index:300;transform:translateY(40px);opacity:0;transition:all .2s;pointer-events:none;max-width:85vw;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(34,197,94,.5);color:var(--green);}
.toast.err{border-color:rgba(239,68,68,.5);color:#f87171;}
</style>
</head>
<body>
<div id="hdr">
  <div class="logo"><div class="logo-yt"></div>MULTIVIEW</div>
  <div class="sep"></div>
  <div class="ltg" id="ltg">
    <button class="ltb on" data-l="grid">GRID</button>
    <button class="ltb" data-l="main">PRINCIPAL</button>
  </div>
  <div class="sep"></div>
  <button class="btn" id="cfg-btn">&#9881; CONFIG</button>
  <button class="btn primary" id="load-btn">&#9654; CARGAR</button>
</div>

<div id="cfg" class="hide">
  <div class="cfg-tabs">
    <button class="cfg-tab on" data-t="canales">Mi MultiView</button>
    <button class="cfg-tab" data-t="presets">Canales</button>
  </div>
  <div class="cfg-pane on" id="pane-canales">
    <div class="ch-list" id="ch-list"></div>
    <div class="ch-actions">
      <button class="btn ghost sm" id="clear-btn">&#10005; LIMPIAR</button>
    </div>
  </div>
  <div class="cfg-pane" id="pane-presets">
    <div class="presets-grid" id="presets-grid"></div>
    <div class="add-box">
      <div class="add-title">+ Agregar canal</div>
      <div class="add-row">
        <input type="text" id="custom-url-inp" placeholder="youtube.com/@luzutv" autocomplete="off">
        <input type="text" id="custom-name-inp" placeholder="Nombre" style="width:90px;" autocomplete="off">
        <button class="btn primary sm" id="add-custom-btn">GUARDAR</button>
      </div>
      <div class="add-note">Ej: youtube.com/@luzutv</div>
    </div>
  </div>
</div>

<div id="area">
  <div id="empty">
    <div class="empty-ico"></div>
    <div class="empty-t">Cargando canales...</div>
    <div class="empty-s">Si no carga solo, tap en CARGAR</div>
  </div>
  <div id="vcon" style="display:none;"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── CANALES BASE (channel IDs verificados) ──
var CANALES = [
  {name:'LUZUTV',   id:'UCTHaNTsP7hsVgBxARZTuajw', color:'#f97316'},
  {name:'OLGA',     id:'UC7mJ2EDXFomeDIRFu5FtEbA',  color:'#8b5cf6'},
  {name:'BONDI',    id:'UCnZidingmuqNkaT9Wm64Xxg',  color:'#fbbf24'},
  {name:'LA CASA',  id:'UC4u0BhsSi33PS20_1JHiC5A',  color:'#f43f5e'},
  {name:'URBANA',   id:'UCC1kfsMJko54AqxtcFECt-A',  color:'#38bdf8'},
  {name:'VORTERIX', id:'UCulzKEqyE73gXCUqTimbP4A',  color:'#a855f7'},
  {name:'BLENDER',  id:'UC6pJGaMdx5Ter_8zYbLoRgA',  color:'#0ea5e9'},
  {name:'CARNAVAL', id:'UCRtgbxUH456ox51IswIQgZQ',  color:'#ec4899'},
  {name:'S.DEP',    id:'UC1Tw7oE-tWiA3qXEPpq9SWQ',  color:'#22c55e'},
  {name:'UPDR',     id:'UCg6kTB4vw1XYFBR4TtHaBuQ',  color:'#f59e0b'},
  {name:'RESUMIDO', id:'UCV7c9y3uWckx0kyXSHhKJXw',  color:'#64748b'},
  {name:'AZZ',      id:'UCgLBmUFPO8JtZ1nPIBQGMlQ',  color:'#e11d48'},
  {name:'GELATINA', id:'UCWSfXECGo1qK_H7SXRaUSMg',  color:'#10b981'},
  {name:'TELEFE',   id:'UChxGASjdNEYHhVKpl667Huw',  color:'#7c3aed'},
  {name:'PRENDE',   id:'UCdefB8ygPtgt4u0O66z4ncw',  color:'#0284c7'}
];

var CUSTOM_COLORS = ['#e11d48','#7c3aed','#0891b2','#059669','#d97706','#dc2626','#2563eb','#9333ea','#be185d'];
var MAX = 9;
var layout = 'grid';
var muteMap = {};
var statsTimers = {};
var liveCache = {};
var TTL = 15 * 60 * 1000; // 15 min cache para findLive

// ── PERSISTENCIA ──
function saveChannels() {
  try {
    localStorage.setItem('mv_channels', JSON.stringify(
      channels.map(function(c) {
        return {src:c.src, id:c.id||'', url:c.url||'', name:c.name, color:c.color, main:!!c.main};
      })
    ));
  } catch(e) {}
}
function loadChannels() {
  try {
    var s = localStorage.getItem('mv_channels');
    if (s) {
      var arr = JSON.parse(s);
      var res = arr.map(function(x) {
        if (x.src === 'preset') {
          var p = CANALES.find(function(c){ return c.id === x.id; });
          return p ? {src:'preset',id:p.id,name:p.name,color:p.color,main:!!x.main} : null;
        }
        return {src:'custom',id:null,url:x.url||'',name:x.name||'Canal',color:x.color||'#888',main:!!x.main};
      }).filter(Boolean);
      if (res.length) return res;
    }
  } catch(e) {}
  // Default: primeros 9
  return CANALES.slice(0, 9).map(function(c){ return {src:'preset',id:c.id,name:c.name,color:c.color,main:false}; });
}
var channels = loadChannels();

// ── UTILS ──
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n){ if(n==null||isNaN(+n))return null; n=+n; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n.toLocaleString(); }
function toast(msg,type){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast show '+(type||''); setTimeout(function(){ t.className='toast'; },2800); }

// ── API ──
function apiFetch(p){ return fetch('/api/youtube?'+new URLSearchParams(p)).then(function(r){ return r.json(); }); }
function findLive(id){
  var c=liveCache[id]; if(c&&Date.now()-c.ts<TTL) return Promise.resolve(c.videoId);
  return apiFetch({action:'findLive',channelId:id}).then(function(d){
    var vid = d.error ? null : (d.videoId||null);
    liveCache[id]={videoId:vid,ts:Date.now()};
    return vid;
  }).catch(function(){ return null; });
}
function fetchStats(videoId,cardId){
  if(!videoId) return;
  apiFetch({action:'stats',videoId:videoId}).then(function(d){
    if(d.error) return;
    var vEl=document.querySelector('#'+cardId+' .sv-viewers');
    var lEl=document.querySelector('#'+cardId+' .sv-likes');
    var dEl=document.querySelector('#'+cardId+' .live-dot');
    if(vEl){ var fv=fmt(d.viewers?+d.viewers:null); vEl.textContent=fv||'—'; vEl.classList.toggle('dim',!fv); }
    // likes disponibles pero no mostrados: d.likes
    if(dEl) dEl.style.display=d.viewers?'inline-block':'none';
  }).catch(function(){});
}
function parseYTUrl(url){
  url=(url||'').trim().split('?')[0];
  if(!url) return null;
  var vm=url.match(/(?:[?&]v=|youtu\.be\/|\/embed\/|\/live\/)([a-zA-Z0-9_-]{11})/);
  if(vm) return {type:'video',id:vm[1]};
  if(/^[a-zA-Z0-9_-]{11}$/.test(url)) return {type:'video',id:url};
  var cm=url.match(/\/channel\/(UC[a-zA-Z0-9_-]{22})/);
  if(cm) return {type:'channelId',id:cm[1]};
  var hm=url.match(/@([a-zA-Z0-9_.%-]+)/);
  if(hm) return {type:'handle',handle:hm[1]};
  if(/^[a-zA-Z0-9_.%-]{3,30}$/.test(url)) return {type:'handle',handle:url};
  return null;
}

// ── DRAG & DROP (desktop + mobile touch) ──
var dragIdx = null;
var touchDragIdx = null;
var touchClone = null;

function doReorder(fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  var moved = channels.splice(fromIdx, 1)[0];
  channels.splice(toIdx, 0, moved);
  saveChannels(); renderCfg();
}

function setupDrag(row, idx) {
  // Desktop drag
  row.draggable = true;
  row.addEventListener('dragstart', function(e) {
    dragIdx = idx;
    row.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  row.addEventListener('dragend', function() {
    row.classList.remove('dragging');
    document.querySelectorAll('.ch-row').forEach(function(r){ r.classList.remove('drag-over'); });
    dragIdx = null;
  });
  row.addEventListener('dragover', function(e) {
    e.preventDefault();
    if (dragIdx !== idx) { document.querySelectorAll('.ch-row').forEach(function(r){ r.classList.remove('drag-over'); }); row.classList.add('drag-over'); }
  });
  row.addEventListener('dragleave', function() { row.classList.remove('drag-over'); });
  row.addEventListener('drop', function(e) {
    e.preventDefault();
    if (dragIdx !== null && dragIdx !== idx) doReorder(dragIdx, idx);
  });

  // Mobile touch drag - solo desde el handle
  var handle = row.querySelector('.ch-drag');
  if (!handle) return;
  handle.addEventListener('touchstart', function(e) {
    e.preventDefault();
    touchDragIdx = idx;
    row.classList.add('dragging');
    // Crear clon visual
    touchClone = row.cloneNode(true);
    touchClone.style.cssText = 'position:fixed;opacity:.8;background:#17172a;border-radius:6px;border:1px solid rgba(255,255,255,.3);z-index:999;pointer-events:none;width:'+row.offsetWidth+'px;padding:4px;';
    document.body.appendChild(touchClone);
    var touch = e.touches[0];
    touchClone.style.left = touch.clientX - 20 + 'px';
    touchClone.style.top = touch.clientY - 15 + 'px';
  }, {passive:false});

  handle.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (!touchClone) return;
    var touch = e.touches[0];
    touchClone.style.left = touch.clientX - 20 + 'px';
    touchClone.style.top = touch.clientY - 15 + 'px';
    // Highlight target
    document.querySelectorAll('.ch-row').forEach(function(r){ r.classList.remove('drag-over'); });
    var el = document.elementFromPoint(touch.clientX, touch.clientY);
    var targetRow = el ? el.closest('.ch-row') : null;
    if (targetRow && targetRow !== row) targetRow.classList.add('drag-over');
  }, {passive:false});

  handle.addEventListener('touchend', function(e) {
    if (touchClone) { touchClone.remove(); touchClone = null; }
    row.classList.remove('dragging');
    document.querySelectorAll('.ch-row').forEach(function(r){ r.classList.remove('drag-over'); });
    if (touchDragIdx === null) return;
    var touch = e.changedTouches[0];
    var el = document.elementFromPoint(touch.clientX, touch.clientY);
    var targetRow = el ? el.closest('.ch-row') : null;
    if (targetRow) {
      var rows = Array.from(document.querySelectorAll('.ch-row'));
      var toIdx = rows.indexOf(targetRow);
      if (toIdx >= 0 && toIdx !== touchDragIdx) doReorder(touchDragIdx, toIdx);
    }
    touchDragIdx = null;
  }, {passive:false});
}

// ── RENDER CFG ──
function renderCfg() {
  var list = document.getElementById('ch-list');
  list.innerHTML = '';
  channels.forEach(function(ch, i) {
    var row = document.createElement('div');
    row.className = 'ch-row';
    var isPreset = ch.src === 'preset';
    row.innerHTML =
      '<span class="ch-drag">&#8942;</span>' +
      '<span class="ch-num">'+(i+1)+'</span>' +
      '<div class="ch-preset-pill">' +
        '<span class="cp-dot" style="background:'+ch.color+'"></span>' +
        '<span class="cp-name">'+esc(ch.name)+'</span>' +
        '<span class="cp-tag">'+(isPreset?'auto':'custom')+'</span>' +
      '</div>' +
      '<button class="star-btn'+(ch.main?' on':'')+'" data-i="'+i+'" title="Principal">&#9733;</button>' +
      '<button class="rm-btn" data-rm="'+i+'" title="Eliminar">&#10005;</button>';
    list.appendChild(row);
    setupDrag(row, i);
  });
  list.querySelectorAll('.star-btn').forEach(function(el){
    el.addEventListener('click', function(){
      var idx=+this.dataset.i;
      channels.forEach(function(c,i){ c.main=(i===idx)?!c.main:false; });
      saveChannels(); renderCfg();
    });
  });
  list.querySelectorAll('.rm-btn').forEach(function(el){
    el.addEventListener('click', function(){
      channels.splice(+this.dataset.rm, 1);
      saveChannels(); renderCfg(); renderPresets();
    });
  });
}

function renderPresets() {
  var g = document.getElementById('presets-grid');
  g.innerHTML = '';
  // Presets base
  CANALES.forEach(function(p) {
    var added = channels.some(function(c){ return c.src==='preset'&&c.id===p.id; });
    var chip = document.createElement('div');
    chip.className = 'pchip'+(added?' added':'');
    chip.innerHTML = '<div class="plogo" style="background:'+p.color+'">'+esc(p.name.slice(0,3))+'</div><span class="pname">'+esc(p.name)+'</span><span class="padd">'+(added?'✕':'+')+'</span>';
    chip.addEventListener('click', function(){
      var i = channels.findIndex(function(c){ return c.src==='preset'&&c.id===p.id; });
      if (i>=0) {
        channels.splice(i,1); saveChannels(); renderCfg(); renderPresets(); toast(p.name+' eliminado');
      } else {
        if(channels.length>=MAX){ toast('Máx '+MAX+' en pantalla','err'); return; }
        channels.push({src:'preset',id:p.id,name:p.name,color:p.color,main:false});
        saveChannels(); renderCfg(); renderPresets(); toast(p.name+' agregado ✓','ok');
      }
    });
    g.appendChild(chip);
  });
  // Custom guardados — siempre con opción de eliminar permanentemente
  channels.forEach(function(c, idx) {
    if (c.src !== 'custom') return;
    var chip = document.createElement('div');
    chip.className = 'pchip added';
    chip.style.cssText = 'border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.05);';
    chip.innerHTML =
      '<div class="plogo" style="background:'+c.color+'">'+esc((c.name||'?').slice(0,3))+'</div>' +
      '<span class="pname">'+esc(c.name)+'</span>' +
      '<span style="font-size:9px;color:#f87171;font-family:var(--mono);margin-left:2px;">custom</span>' +
      '<span class="padd" style="color:#f87171;margin-left:4px;" title="Eliminar permanentemente">🗑</span>';
    chip.addEventListener('click', (function(i, name){ return function(){
      if (!confirm('Eliminar "'+name+'" permanentemente?')) return;
      channels.splice(i,1); saveChannels(); renderCfg(); renderPresets(); toast(name+' eliminado');
    }; })(idx, c.name));
    g.appendChild(chip);
  });
}

function switchTab(name) {
  document.querySelectorAll('.cfg-tab').forEach(function(t){ t.classList.toggle('on',t.dataset.t===name); });
  document.querySelectorAll('.cfg-pane').forEach(function(p){ p.classList.toggle('on',p.id==='pane-'+name); });
  if(name==='presets') renderPresets();
}

function setMainChannel(idx) {
  channels.forEach(function(c,i){ c.main=(i===idx)?!c.main:false; });
  saveChannels(); renderCfg();
  if(layout==='main'){ renderVideos(); }
  else {
    var active=channels.filter(function(c){ return c.src==='preset'||(c.url||'').trim(); });
    document.querySelectorAll('.vc').forEach(function(card,i){
      var ch=active[i]; if(!ch) return;
      card.classList.toggle('is-main-card',!!ch.main);
      var btn=card.querySelector('.cc.make-main');
      if(btn) btn.classList.toggle('is-main',!!ch.main);
    });
    if(channels.find(function(c){ return c.main; })) toast('★ Tap en PRINCIPAL para verlo grande','ok');
  }
}

// ── IFRAMES ──
function loadIframe(cardId, videoId) {
  var vw=document.getElementById('vw-'+cardId); if(!vw) return;
  if(!videoId) return;
  var src='https://www.youtube-nocookie.com/embed/'+videoId+'?autoplay=1&mute=1&enablejsapi=1&rel=0&playsinline=1';
  vw.innerHTML='<iframe id="yt-'+cardId+'" src="'+src+'" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen playsinline></iframe>';
  fetchStats(videoId,cardId);
  statsTimers[cardId]=setInterval(function(){ fetchStats(videoId,cardId); },60000);
}
function showOffline(cardId,name) {
  var vw=document.getElementById('vw-'+cardId); if(!vw) return;
  var card=document.getElementById(cardId); if(card) card.classList.add('is-offline');
  vw.innerHTML='<div class="vph"><div class="vph-ico"></div><span class="vph-txt">'+esc(name)+'</span><span class="vph-sub">Sin transmisión ahora</span></div>';
}
function clearTimers(){ Object.keys(statsTimers).forEach(function(k){ clearInterval(statsTimers[k]); }); statsTimers={}; }

// ── RESOLVE CARD ──
function resolveCard(ch, cardId) {
  if (ch.src==='preset') {
    findLive(ch.id).then(function(vid){ if(vid) loadIframe(cardId,vid); else showOffline(cardId,ch.name); });
  } else {
    var p=parseYTUrl(ch.url);
    if(!p){ showOffline(cardId,ch.name||'Canal'); return; }
    if(p.type==='video'){ loadIframe(cardId,p.id); }
    else if(p.type==='channelId'){
      findLive(p.id).then(function(vid){ if(vid) loadIframe(cardId,vid); else showOffline(cardId,ch.name); });
    } else if(p.type==='handle'){
      apiFetch({action:'resolveHandle',handle:p.handle}).then(function(d){
        if(d&&d.channelId) findLive(d.channelId).then(function(vid){ if(vid) loadIframe(cardId,vid); else showOffline(cardId,ch.name); });
        else showOffline(cardId,ch.name);
      }).catch(function(){ showOffline(cardId,ch.name); });
    }
  }
}

// ── BUILD CARD ──
function buildCard(ch, cardId, chIdx) {
  var card=document.createElement('div');
  card.className='vc'+(ch.main?' is-main-card':'');
  card.id=cardId;
  var isMuted=muteMap[cardId]!==false;
  card.innerHTML=
    '<div class="ct">'+
      '<span class="ch-dot" style="background:'+(ch.color||'var(--t2)')+'"></span>'+
      '<span class="ch-name">'+esc(ch.name||ch.url||'Canal')+'</span>'+
      '<div class="stats">'+
        '<div class="stat-block">'+
          '<span class="live-dot" style="display:none;"></span>'+
          '<span class="stat-ico">&#128065;</span>'+
          '<span class="sv-viewers dim">&#8212;</span>'+
        '</div>'+
        '<div class="stat-block">'+
          '<span class="stat-ico stat-ico-likes">&#9829;</span>'+
          '<span class="sv-likes dim">&#8212;</span>'+
        '</div>'+
      '</div>'+
      '<div class="card-btns">'+
        '<button class="cc make-main'+(ch.main?' is-main':'')+'" data-idx="'+chIdx+'">&#9733;</button>'+
        '<button class="cc'+(isMuted?' muted':'')+'" data-mute="'+cardId+'">'+(isMuted?'&#128263;':'&#128266;')+'</button>'+
        '<button class="cc cc-fs" data-fs="'+cardId+'">&#9974;</button>'+
      '</div>'+
    '</div>'+
    '<div class="vw" id="vw-'+cardId+'"><div class="vph"><div class="spin"></div><span class="vph-txt">Cargando...</span></div></div>';

  card.querySelector('.make-main').addEventListener('click',function(){ setMainChannel(+this.dataset.idx); });
  card.querySelector('[data-mute]').addEventListener('click',function(){
    var cid=this.dataset.mute; var nm=muteMap[cid]!==false; muteMap[cid]=!nm;
    var iframe=document.getElementById('yt-'+cid);
    if(iframe){ try{ iframe.contentWindow.postMessage(JSON.stringify({event:'command',func:nm?'unMute':'mute',args:''}),'*'); }catch(e){} }
    this.classList.toggle('muted',!nm); this.innerHTML=!nm?'&#128263;':'&#128266;';
  });
  // Fullscreen con toggle
  card.querySelector('.cc-fs').addEventListener('click',function(){
    var f=document.getElementById('yt-'+this.dataset.fs);
    if(!f) return;
    if(document.fullscreenElement||document.webkitFullscreenElement){
      if(document.exitFullscreen) document.exitFullscreen();
      else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    } else {
      if(f.requestFullscreen) f.requestFullscreen();
      else if(f.webkitRequestFullscreen) f.webkitRequestFullscreen();
    }
  });
  return card;
}

// ── RENDER VIDEOS ──
function renderVideos() {
  clearTimers();
  var active=channels.filter(function(c){ return c.src==='preset'||(c.url||'').trim(); });
  var vcon=document.getElementById('vcon');
  var empty=document.getElementById('empty');
  vcon.innerHTML='';
  if(!active.length){ vcon.style.display='none'; empty.style.display='flex'; return; }
  empty.style.display='none'; vcon.style.display='block';

  if(layout==='main') {
    var bigCh=active.find(function(c){ return c.main; })||active[0];
    var rest=active.filter(function(c){ return c!==bigCh; });
    var half=Math.ceil(rest.length/2);
    var topChs=rest.slice(0,half);
    var botChs=rest.slice(half);

    var wrap=document.createElement('div'); wrap.className='main-wrap';

    if(topChs.length>0){
      var rowTop=document.createElement('div'); rowTop.className='main-row';
      topChs.forEach(function(ch,i){ rowTop.appendChild(buildCard(ch,'card-t'+i,channels.indexOf(ch))); });
      wrap.appendChild(rowTop);
    }
    var bigDiv=document.createElement('div'); bigDiv.className='main-big';
    bigDiv.appendChild(buildCard(bigCh,'card-main',channels.indexOf(bigCh)));
    wrap.appendChild(bigDiv);
    if(botChs.length>0){
      var rowBot=document.createElement('div'); rowBot.className='main-row';
      botChs.forEach(function(ch,i){ rowBot.appendChild(buildCard(ch,'card-b'+i,channels.indexOf(ch))); });
      wrap.appendChild(rowBot);
    }
    vcon.appendChild(wrap);
    resolveCard(bigCh,'card-main');
    topChs.forEach(function(ch,i){ resolveCard(ch,'card-t'+i); });
    botChs.forEach(function(ch,i){ resolveCard(ch,'card-b'+i); });
  } else {
    var n=Math.min(active.length,9);
    var grid=document.createElement('div'); grid.className='vg g'+n;
    active.forEach(function(ch,i){ grid.appendChild(buildCard(ch,'card-'+i,channels.indexOf(ch))); });
    vcon.appendChild(grid);
    active.forEach(function(ch,i){ resolveCard(ch,'card-'+i); });
  }
}

// ── EVENTOS ──
document.getElementById('cfg-btn').addEventListener('click',function(){ document.getElementById('cfg').classList.toggle('hide'); });
document.getElementById('load-btn').addEventListener('click',function(){ renderVideos(); toast('Cargando...','ok'); document.getElementById('cfg').classList.add('hide'); });
document.getElementById('clear-btn').addEventListener('click',function(){
  channels=CANALES.slice(0,9).map(function(c){ return {src:'preset',id:c.id,name:c.name,color:c.color,main:false}; });
  saveChannels(); renderCfg(); renderPresets();
});
document.getElementById('ltg').addEventListener('click',function(e){
  var b=e.target.closest('.ltb'); if(!b) return;
  layout=b.dataset.l;
  document.querySelectorAll('.ltb').forEach(function(x){ x.classList.remove('on'); });
  b.classList.add('on'); renderVideos();
});
document.querySelectorAll('.cfg-tab').forEach(function(t){ t.addEventListener('click',function(){ switchTab(t.dataset.t); }); });
document.getElementById('add-custom-btn').addEventListener('click',function(){
  var url=(document.getElementById('custom-url-inp').value||'').trim();
  var name=(document.getElementById('custom-name-inp').value||'').trim();
  if(!url){ toast('Pegá la URL del canal','err'); return; }
  var parsed=parseYTUrl(url);
  if(!parsed){ toast('URL no reconocida','err'); return; }
  if(channels.length>=MAX){ toast('Máx '+MAX+'. Eliminá uno primero','err'); return; }
  var displayName=name||(parsed.handle?parsed.handle:'Canal');
  var ci=channels.filter(function(c){ return c.src==='custom'; }).length;
  channels.push({src:'custom',id:null,url:url,name:displayName,color:CUSTOM_COLORS[ci%CUSTOM_COLORS.length],main:false});
  saveChannels(); renderCfg(); renderPresets();
  document.getElementById('custom-url-inp').value='';
  document.getElementById('custom-name-inp').value='';
  toast(displayName+' agregado ✓','ok');
});

// Fullscreen change listener para actualizar icono
document.addEventListener('fullscreenchange',function(){ document.querySelectorAll('.cc-fs').forEach(function(btn){ btn.innerHTML=document.fullscreenElement?'&#9633;':'&#9974;'; }); });
document.addEventListener('webkitfullscreenchange',function(){ document.querySelectorAll('.cc-fs').forEach(function(btn){ btn.innerHTML=document.webkitFullscreenElement?'&#9633;':'&#9974;'; }); });

// ── INIT ──
renderCfg();
renderVideos();
</script>
